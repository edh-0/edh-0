name: Generate Language Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-lang-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate language stats with chart
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install matplotlib
          
          cat > generate_stats.py << 'PYTHON'
          import json
          from collections import Counter
          import matplotlib.pyplot as plt
          import matplotlib
          matplotlib.use('Agg')
          
          with open('repos.json', 'w') as f:
              pass 
          
          import subprocess
          subprocess.run(['curl', '-s', 'https://api.github.com/users/edh-0/repos?per_page=100', '-o', 'repos.json'])
          
          with open('repos.json') as f:
              repos = json.load(f)
          
          languages = Counter()
          for repo in repos:
              if repo.get('language'):
                  languages[repo['language']] += 1
          
          top = dict(languages.most_common(8))
          other_count = sum(count for lang, count in languages.items() if lang not in top)
          if other_count > 0:
              top['Other'] = other_count
          
          plt.style.use('dark_background')
          fig, ax = plt.subplots(figsize=(8, 6))
          
          colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#FF8C94', '#A8E6CF']
          
          wedges, texts, autotexts = ax.pie(
              top.values(), 
              labels=top.keys(),
              autopct='%1.1f%%',
              colors=colors[:len(top)],
              startangle=90,
              textprops={'color': 'white', 'fontsize': 10}
          )
          
          plt.title('Programming Languages Used', color='white', fontsize=16, pad=20)
          
          plt.tight_layout()
          plt.savefig('languages-chart.png', dpi=100, bbox_inches='tight', facecolor='#0d1117')
          PYTHON
          
          python3 generate_stats.py
      
      - name: Commit and push
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add languages-chart.png
          git diff --staged --quiet || (git commit -m "Update language chart [skip ci]" && git push origin main)
